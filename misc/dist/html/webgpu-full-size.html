<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;

/**
 * Pre-initialize the WebGPU device before the Godot WASM module starts.
 * This is required because emscripten_webgpu_get_device() in C++ retrieves
 * the device synchronously from Module['preinitializedWebGPUDevice'], which
 * must be set before the WASM main() function runs.
 *
 * @returns {Promise<?GPUDevice>} The initialized device, or null if unavailable.
 */
async function initWebGPU() {
	if (typeof navigator.gpu === 'undefined') {
		console.warn('WebGPU not supported in this browser. See https://caniuse.com/webgpu for support information.');
		return null;
	}

	let adapter;
	try {
		adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
	} catch (e) {
		console.warn('WebGPU: Failed to request adapter:', e);
		return null;
	}
	if (!adapter) {
		console.warn('WebGPU: No GPU adapter available (hardware or driver not supported).');
		return null;
	}

	// Log adapter info for debugging.
	const adapterInfo = adapter.info || {};
	console.info('WebGPU adapter:', adapterInfo.description || adapterInfo.vendor || '(unknown)');

	// Request optional features that Godot can use if available.
	const wantedFeatures = [
		'texture-compression-bc',
		'texture-compression-etc2',
		'texture-compression-astc',
		'depth-clip-control',
		'depth32float-stencil8',
		'indirect-first-instance',
		'rg11b10ufloat-renderable',
		'bgra8unorm-storage',
		'float32-filterable',
	];
	const requiredFeatures = wantedFeatures.filter((f) => adapter.features.has(f));

	// Request limits that Godot's renderer needs.
	const requiredLimits = {};
	const wantedLimits = {
		maxTextureDimension2D: 16384,
		maxTextureArrayLayers: 2048,
		maxBindGroups: 4,
		maxBindingsPerBindGroup: 640,
		maxDynamicUniformBuffersPerPipelineLayout: 8,
		maxDynamicStorageBuffersPerPipelineLayout: 4,
		maxSampledTexturesPerShaderStage: 16,
		maxSamplersPerShaderStage: 16,
		maxStorageBuffersPerShaderStage: 8,
		maxStorageTexturesPerShaderStage: 4,
		maxUniformBuffersPerShaderStage: 12,
		maxUniformBufferBindingSize: 65536,
		maxStorageBufferBindingSize: 134217728,
		maxVertexBuffers: 8,
		maxVertexAttributes: 16,
		maxColorAttachments: 8,
	};
	for (const [limit, value] of Object.entries(wantedLimits)) {
		if (limit in adapter.limits) {
			requiredLimits[limit] = Math.min(value, adapter.limits[limit]);
		}
	}

	let device;
	try {
		device = await adapter.requestDevice({ requiredFeatures, requiredLimits });
	} catch (e) {
		console.warn('WebGPU: Failed to request device:', e);
		return null;
	}

	device.lost.then((info) => {
		console.error('WebGPU device lost:', info.reason, info.message);
	});

	console.info('WebGPU device ready. Features:', [...device.features].join(', ') || '(none)');
	return device;
}

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');

		// Pre-initialize WebGPU device before starting the engine.
		// The device must be available when the WASM module boots so that
		// emscripten_webgpu_get_device() can return it synchronously.
		initWebGPU().then((webgpuDevice) => {
			const engineConfig = Object.assign({}, GODOT_CONFIG);
			if (webgpuDevice) {
				engineConfig['preinitializedWebGPUDevice'] = webgpuDevice;
			} else {
				// No WebGPU device — the engine will fall back to gl_compatibility
				// if opengl3=yes was also compiled in. Otherwise it will fail at init.
				console.warn('WebGPU unavailable, engine will attempt fallback.');
			}

			const engine = new Engine(engineConfig);
			engine.startGame({
				'onProgress': function (current, total) {
					if (current > 0 && total > 0) {
						statusProgress.value = current;
						statusProgress.max = total;
					} else {
						statusProgress.removeAttribute('value');
						statusProgress.removeAttribute('max');
					}
				},
			}).then(() => {
				setStatusMode('hidden');
			}, displayFailureNotice);
		}).catch(displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
