name: komm64 Windows Build

# komm64 fork 専用の Windows editor binary build workflow.
# 公式の windows_builds.yml は msvc + clang-cl + template_release + mingw の
# 4 ビルド matrix で重いので、ここでは MSVC editor binary 1 個に絞る。
# template_release は配布フェーズが進んでから別 workflow で追加する想定。
# その他の build flag (D3D12 / ANGLE / WinRT / AccessKit) は公式と同等にして、
# 後で「dev binary と production binary で挙動差があった」debug 困難を避ける。
#
# Trigger:
#   - workflow_dispatch: 手動 trigger (ad-hoc 検証用)
#   - tag push (v*-komm64*): 自動 build + Release 作成
#
# Output:
#   - artifact: komm64-godot-windows-editor (60-day retention)
#   - tag push 時のみ: GitHub Release に exe を添付

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-komm64*'

# softprops/action-gh-release@v2 needs contents:write to create the release.
# Default GITHUB_TOKEN permission (contents:read) caused 403 on the first
# tag-trigger run (run #25262508341).
permissions:
  contents: write

env:
  SCONS_FLAGS: >-
    module_text_server_fb_enabled=yes
    debug_symbols=no
  SCONS_CACHE_MSVC_CONFIG: true
  PYTHONIOENCODING: utf8

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Restore build cache
        uses: ./.github/actions/godot-cache-restore
        with:
          cache-name: komm64-windows-editor
        continue-on-error: true

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Following 4 SDK download steps mirror the official windows_builds.yml.
      # Each is `continue-on-error: true` (or wraps with try/fallback) so a
      # missing SDK falls back to building without that component instead of
      # failing the whole build.

      - name: Download Direct3D 12 SDK components
        shell: sh
        id: d3d12-sdk
        run: |
          if python ./misc/scripts/install_d3d12_sdk_windows.py; then
            echo "D3D12_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Windows: Direct3D 12 SDK installation failed, building without Direct3D 12 support."
            echo "D3D12_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Download pre-built ANGLE
        shell: sh
        id: angle-sdk
        run: |
          if python ./misc/scripts/install_angle.py; then
            echo "ANGLE_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ANGLE SDK installation failed, building without ANGLE support."
            echo "ANGLE_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Download WinRT components
        shell: sh
        run: python ./misc/scripts/install_winrt.py
        continue-on-error: true

      - name: Download pre-built AccessKit
        shell: sh
        id: accesskit-sdk
        run: |
          if python ./misc/scripts/install_accesskit.py; then
            echo "ACCESSKIT_ENABLED=yes" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::AccessKit SDK installation failed, building without AccessKit support."
            echo "ACCESSKIT_ENABLED=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Compilation
        uses: ./.github/actions/godot-build
        with:
          scons-flags: ${{ env.SCONS_FLAGS }} d3d12=${{ steps.d3d12-sdk.outputs.D3D12_ENABLED }} accesskit=${{ steps.accesskit-sdk.outputs.ACCESSKIT_ENABLED }} angle=${{ steps.angle-sdk.outputs.ANGLE_ENABLED }}
          platform: windows
          target: editor

      - name: Save build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: komm64-windows-editor
        continue-on-error: true

      - name: Prepare artifact
        run: |
          Remove-Item bin/* -Include *.exp,*.lib,*.pdb -Force

      - name: Upload artifact
        uses: ./.github/actions/upload-artifact
        with:
          name: komm64-godot-windows-editor
          path: bin/godot.windows.editor.x86_64.exe

      - name: Create Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/godot.windows.editor.x86_64.exe
          generate_release_notes: true
